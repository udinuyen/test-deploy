<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Notebook Web</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      margin-top: 40px;
    }

    #container {
      text-align: center;
    }

    #book {
      width: 400px;
      height: 300px;
      perspective: 1000px;
      position: relative;
    }

    .page {
      width: 100%;
      height: 100%;
      background: white;
      position: absolute;
      top: 0;
      left: 0;
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 15px;
      box-sizing: border-box;
      transform-origin: left;
      transform: rotateY(90deg);
      transition: transform 0.5s;
    }

    .page.active {
      transform: rotateY(0deg);
      z-index: 2;
    }

    textarea {
      width: 100%;
      height: 100%;
      border: none;
      outline: none;
      resize: none;
      font-size: 16px;
    }

    button {
      margin: 10px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }

  </style>
</head>
<body>

<div id="container">
  <h2>📖 Notebook</h2>

  <div id="book"></div>

  <div>
    <button onclick="prevPage()">⬅ Trang trước</button>
    <button onclick="nextPage()">Trang sau ➡</button>
  </div>
</div>

<script>
  const totalPages = 5;
  let current = 0;
  const book = document.getElementById("book");
  let pages = [];

  // Tạo trang
  for (let i = 0; i < totalPages; i++) {
    const page = document.createElement("div");
    page.className = "page";

    const textarea = document.createElement("textarea");
    textarea.placeholder = "Viết nội dung trang " + (i + 1);

    // load data
    textarea.value = localStorage.getItem("page_" + i) || "";

    // auto save
    textarea.addEventListener("input", () => {
      localStorage.setItem("page_" + i, textarea.value);
    });

    page.appendChild(textarea);
    book.appendChild(page);
    pages.push(page);
  }

  // hiển thị trang đầu
  pages[current].classList.add("active");

  function showPage(index) {
    pages[current].classList.remove("active");
    current = index;
    pages[current].classList.add("active");
  }

  function nextPage() {
    if (current < pages.length - 1) {
      showPage(current + 1);
    }
  }

  function prevPage() {
    if (current > 0) {
      showPage(current - 1);
    }
  }

</script>

</body>
</html>
